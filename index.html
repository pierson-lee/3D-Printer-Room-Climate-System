<!DOCTYPE html>
<html>
<head>
  <title>3D Printer Climate System</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!--navbar-->
  <nav class="navbar">
    <div class="nav-links">
      <a href="/" class="nav-item">Home</a>
      <a href="/timeline.html" class="nav-item">Timeline</a>
      <a href="/about.html" class="nav-item">About</a>
    </div>
  </nav>
  
  <!--temp and humidity panels-->
  <div class="container">
    <h1>3D Printer Climate System</h1>

    <div class="card">
      <h2>Temperature</h2>
      <p id="temp">-- °C</p>
    </div>

    <div class="card">
      <h2>Humidity</h2>
      <p id="hum">-- %</p>
    </div>

    <div class="card">
      <h2>Check Filament</h2>
      <select id="filamentSelect" onchange="updateFilamentCheck()"> <!--runs this function if the dropdown is changed regardless of the data recency-->
        <option value="PLA">PLA</option>
        <option value="PETG">PETG</option>
        <option value="ABS">ABS</option>
        <option value="TPU">TPU</option>
        <option value="Nylon">Nylon</option>
        <option value="PVA">PVA</option>
        <option value="Polycarbonate">Polycarbonate</option>
      </select>

      <p id="filamentStatus">Select a filament</p>
    </div>
  </div>

  <!--for data interpretation-->
  <script src="script.js"></script>

  <!--for navbar colouring-->
  <script src="/app.js"></script>
</body>
</html>
