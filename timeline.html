<!DOCTYPE html>
<html>
<head>
    <title>Timeline | 3D Printer Climate System</title>
    <link rel="stylesheet" href="style.css">
    <!-- Getting the Chart.js library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <!--navbar-->
    <nav class="navbar">
        <div class="nav-links">
            <a href="/" class="nav-item">Home</a>
            <a href="/timeline.html" class="nav-item">Timeline</a>
            <a href="/about.html" class="nav-item">About</a>
        </div>
    </nav>

    <!--chart panels-->
    <div class="container">
        <h1>Temperature & Humidity Timelines</h1>

        <div class="chart-box">
            <h2>Temperature (°C)</h2>
            <canvas id="tempChart"></canvas>
        </div>

        <div class="chart-box">
            <h2>Humidity (%)</h2>
            <canvas id="humChart"></canvas>
        </div>
    </div>

    <!--for timeline charts-->
    <script src="timeline.js"></script>

    <!--for navbar colouring-->
    <script src="/app.js"></script>
</body>
</html>
